<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atención Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 15px;
      margin-bottom: 25px;
    }

    .box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .item {
      margin: 10px 0;
      font-size: 14px;
    }

    .btn {
      display: block;
      padding: 16px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Atención Online</h1>
  <p>Contactate con nuestro equipo para recibir información y asistencia personalizada.</p>

  <div class="box">
    <div class="item">✔️ Respuesta rápida</div>
    <div class="item">✔️ Atención personalizada</div>
    <div class="item">✔️ Disponible todos los días</div>
  </div>

  <a class="btn" href="https://wa.me/5493436215526?text=Hola%20quiero%20información" target="_blank">
    💬 Contactar por WhatsApp
  </a>

  <div class="footer">
    Servicio de atención digital
  </div>

</div>

</body>
</html>
